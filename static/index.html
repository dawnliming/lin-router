<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lin Router</title>
  <style>
    :root {
      color-scheme: light;
      --bg:#f5f7fb;
      --panel:#fff;
      --line:#d6dce8;
      --text:#18212f;
      --muted:#5b6575;
      --accent:#2358ff;
      --danger:#c62828;
      --ok:#16794c;
      --warn:#a15c00;
      --bad:#b42318;
    }
    * { box-sizing:border-box; }
    body { margin:0; font:14px/1.5 system-ui, -apple-system, "Segoe UI", Arial, "Microsoft YaHei", sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
    header { height:58px; padding:0 22px; display:flex; align-items:center; justify-content:space-between; background:#fff; border-bottom:1px solid var(--line); }
    h1 { margin:0; font-size:18px; font-weight:700; }
    h2 { margin:0 0 12px; font-size:15px; }
    label { display:block; margin:10px 0 6px; color:var(--muted); }
    input, textarea, select, button { font:inherit; }
    input, textarea, select { width:100%; min-width:0; border:1px solid var(--line); border-radius:6px; padding:9px 10px; background:#fff; color:var(--text); }
    textarea { min-height:104px; resize:vertical; overflow:auto; overflow-wrap:anywhere; }
    button { border:1px solid var(--line); background:#fff; color:var(--text); border-radius:6px; padding:7px 10px; cursor:pointer; white-space:nowrap; }
    button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    button.danger { color:var(--danger); }
    button:disabled { opacity:.62; cursor:wait; }
    table { width:100%; border-collapse:collapse; table-layout:fixed; }
    th, td { padding:8px; border-bottom:1px solid var(--line); text-align:left; vertical-align:middle; overflow-wrap:anywhere; }
    th { color:var(--muted); font-weight:600; }
    td.actions { white-space:nowrap; }
    .shell { padding:18px; display:grid; grid-template-columns:minmax(280px, 372px) minmax(0, 1fr); gap:18px; max-width:100vw; min-width:0; }
    .side, .main { display:grid; gap:18px; align-content:start; min-width:0; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:14px; min-width:0; overflow:hidden; }
    .hero { grid-column:1 / -1; display:grid; grid-template-columns:1fr auto; gap:16px; align-items:center; }
    .heroUrl, .codeLine { font-family:Consolas, monospace; background:#f6f8fc; border:1px solid var(--line); border-radius:6px; padding:7px 8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .heroUrl { padding:10px 12px; border-color:#c8d2ff; background:#f1f4ff; }
    .row { display:flex; gap:8px; flex-wrap:wrap; }
    .row > * { flex:1 1 auto; }
    .muted { color:var(--muted); }
    .tiny { font-size:12px; }
    .status { padding:10px 12px; background:#f1f4ff; border:1px solid #cad4ff; border-radius:6px; margin-bottom:12px; }
    .modelGroups { display:grid; gap:10px; }
    .modelGroup { border:1px solid var(--line); border-radius:6px; background:#fff; overflow:hidden; }
    .modelGroup > summary { padding:12px 14px; cursor:pointer; list-style:none; font-weight:700; background:#f8faff; border-bottom:1px solid var(--line); }
    .modelGroup > summary::-webkit-details-marker, details.panel > summary::-webkit-details-marker { display:none; }
    .modelGroupSummary { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .modelGroupActions { display:flex; gap:6px; flex-wrap:nowrap; font-weight:400; overflow-x:auto; }
    .modelGroupActions button { padding:5px 8px; font-size:12px; line-height:1.2; }
    .modelGroupBody { padding:0 14px 12px; overflow:auto; }
    details.panel { padding:0; }
    details.panel > summary { padding:14px; cursor:pointer; font-weight:700; list-style:none; border-bottom:1px solid var(--line); }
    details.panel > .panelBody { padding:14px; }
    .modelTable th:nth-child(1), .modelTable td:nth-child(1) { width:64px; }
    .modelTable th:nth-child(2), .modelTable td:nth-child(2) { width:18%; }
    .modelTable th:nth-child(3), .modelTable td:nth-child(3) { width:18%; }
    .modelTable th:nth-child(4), .modelTable td:nth-child(4) { width:12%; }
    .modelTable th:nth-child(5), .modelTable td:nth-child(5) { width:86px; }
    .modelTable th:nth-child(6), .modelTable td:nth-child(6) { width:auto; }
    .modelTable th:nth-child(7), .modelTable td:nth-child(7) { width:330px; }
    .actionGroup { display:flex; align-items:center; gap:5px; flex-wrap:nowrap; overflow-x:auto; padding-bottom:1px; }
    .actionGroup button { padding:5px 8px; font-size:12px; line-height:1.2; min-width:42px; }
    .pill { display:inline-block; padding:2px 7px; border-radius:999px; background:#edf7f1; color:var(--ok); font-size:12px; line-height:1.3; }
    .pill.off { background:#fff3e6; color:var(--warn); }
    .pill.bad { background:#fff0f0; color:var(--bad); }
    .resultText { max-width:420px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .log { white-space:pre-wrap; overflow-wrap:anywhere; word-break:break-word; background:#0f172a; color:#d9e2ff; border-radius:6px; padding:12px; min-height:120px; max-height:260px; overflow:auto; }
    @media (max-width: 980px) { .shell { grid-template-columns:1fr; } .hero { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>Lin Router</h1>
    <div class="muted tiny" id="serverInfo"></div>
  </header>

  <div class="shell">
    <section class="panel hero">
      <div>
        <h2>客户端接入</h2>
        <div class="heroUrl" id="clientUrl">加载中...</div>
        <div class="muted tiny" style="margin-top:8px">Hermes / Codex++ 填这个 Base URL；API Key 使用目标连接组的本地 lr-... Key。</div>
      </div>
      <button type="button" id="copyClientBtn">复制地址</button>
    </section>

    <aside class="side">
      <details class="panel" open>
        <summary>连接组</summary>
        <div class="panelBody">
          <form id="groupForm">
            <input type="hidden" id="groupId">
            <label>组名</label>
            <input id="groupName" placeholder="默认组">
            <label>模式</label>
            <select id="groupProvider">
              <option value="ark">火山方舟</option>
              <option value="relay">中转站</option>
              <option value="proxy">通用 OpenAI 代理</option>
            </select>
            <label>Base URL</label>
            <input id="groupBase" placeholder="https://example.com/v1">
            <div id="groupKeyWrap">
              <label id="groupKeyLabel">上游 API Key</label>
              <input id="groupKey" type="password" placeholder="sk-xxxx">
            </div>
            <div id="groupCooldownWrap" style="display:none">
              <label>自动冷却分钟</label>
              <input id="groupCooldownMinutes" type="number" min="0" step="1" value="5">
            </div>
            <div id="groupWafWrap" style="display:none; margin-top:10px">
              <label><input id="groupWafCompatible" type="checkbox" style="width:auto"> Hermes / WAF 兼容</label>
            </div>
            <div class="row" style="margin-top:12px">
              <button class="primary" type="submit">保存组</button>
              <button type="button" id="toggleKeyBtn">显示 Key</button>
            </div>
          </form>
          <div class="muted tiny" id="groupModeHint" style="margin-top:10px"></div>
        </div>
      </details>

      <details class="panel" open>
        <summary>模型 / 通道</summary>
        <div class="panelBody">
          <form id="modelForm">
            <input type="hidden" id="modelId">
            <label>显示名称</label>
            <input id="name" placeholder="DeepSeek">

            <div id="epIdWrap">
              <label>上游模型 / EP</label>
              <input id="epId" placeholder="ep-xxxx / deepseek-chat">
            </div>

            <div id="upstreamModelWrap" style="display:none">
              <label>上游模型</label>
              <select id="upstreamModelPick"></select>
            </div>

            <div id="modelKeyWrap">
              <label>中转站 API Key</label>
              <input id="apiKey" type="password" placeholder="sk-xxxx">
            </div>
            <div id="modelPriceWrap">
              <label>价格组 / 通道</label>
              <input id="priceGroup" placeholder="cheap / standard / premium">
            </div>
            <label>连接组</label>
            <select id="groupPick"></select>
            <div class="row" style="margin-top:12px">
              <button class="primary" type="submit">保存模型</button>
              <button type="button" id="resetBtn">全部恢复可用</button>
            </div>
          </form>
          <div class="row" style="margin-top:10px">
            <button type="button" id="fetchUpstreamBtn">自动获取模型</button>
          </div>
          <div class="muted tiny" id="modelModeHint" style="margin-top:10px"></div>
        </div>
      </details>

      <details class="panel">
        <summary>批量导入</summary>
        <div class="panelBody">
          <label>连接组</label>
          <select id="batchGroupPick"></select>
          <label>模型列表</label>
          <textarea id="batchModels" placeholder="显示名称,上游模型&#10;另一个模型,upstream-model-2"></textarea>
          <label>中转站 API Key</label>
          <input id="batchApiKey" type="password" placeholder="中转站批量导入时可填">
          <label>价格组 / 通道</label>
          <input id="batchPriceGroup" placeholder="cheap / standard / premium">
          <div class="row" style="margin-top:12px">
            <button class="primary" type="button" id="batchImportBtn">批量导入模型</button>
          </div>
        </div>
      </details>
    </aside>

    <main class="main">
      <section class="panel">
        <h2>模型列表</h2>
        <div class="status" id="summaryBox">加载中...</div>
        <div class="modelGroups" id="modelGroups"></div>
      </section>

      <details class="panel" open>
        <summary>代理测试</summary>
        <div class="panelBody">
          <label>测试连接组</label>
          <select id="testGroup"></select>
          <label>模板</label>
          <select id="testTemplate">
            <option value="auto">自动调度</option>
            <option value="chat">普通聊天</option>
            <option value="model">指定模型</option>
            <option value="stream">流式请求</option>
          </select>
          <label>模型</label>
          <select id="testModel"></select>
          <label>路径</label>
          <input id="proxyPath" value="/v1/chat/completions">
          <label>请求体</label>
          <textarea id="proxyBody">{ "messages": [{"role":"user","content":"hello"}], "temperature": 0.2 }</textarea>
          <div class="row" style="margin-top:12px">
            <button class="primary" type="button" id="sendTest">发送测试</button>
          </div>
        </div>
      </details>

      <details class="panel" open>
        <summary>返回结果</summary>
        <div class="panelBody"><div class="log" id="logBox">等待操作。</div></div>
      </details>

      <details class="panel" open>
        <summary>最近请求</summary>
        <div class="panelBody">
          <div class="row" style="margin-bottom:10px">
            <button type="button" id="clearLogsBtn">清空日志</button>
            <button type="button" id="exportLogsBtn">导出 CSV</button>
          </div>
          <table>
            <thead><tr><th>时间</th><th>模型</th><th>状态</th><th>耗时</th><th>Token</th><th>详情</th><th>操作</th></tr></thead>
            <tbody id="logTbody"></tbody>
          </table>
        </div>
      </details>
    </main>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const AUTO_MODEL_NAME = "__AUTO_MODEL_NAME__";
    let state = { groups: [], models: [], logs: [], group_meta: {}, auto_model_name: AUTO_MODEL_NAME };

    function esc(text) {
      return String(text ?? "").replace(/[&<>"']/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[s]));
    }

    function log(text) { $("logBox").textContent = text; }
    function formatResponse(text) { try { return JSON.stringify(JSON.parse(text), null, 2); } catch { return text; } }

    function providerLabel(group) {
      if (group?.provider_type === "relay") return "中转站";
      if (group?.provider_type === "proxy") return "通用代理";
      return "火山";
    }

    function statusInfo(m) {
      const group = state.groups.find(g => g.id === m.group_id);
      if (group?.provider_type !== "relay") {
        if (!m.usable) return { text:"停用", cls:"off", detail:m.last_error ? "额度耗尽或手动停用" : "手动停用" };
        if (m.last_error) return { text:"异常", cls:"bad", detail:m.last_error };
        if (m.last_success_at) return { text:"可用", cls:"", detail:`最近成功 ${m.last_success_at}` };
        return { text:"待测", cls:"off", detail:"尚未成功调用" };
      }
      if (m.cooldown_until) {
        const until = new Date(Number(m.cooldown_until) * 1000);
        return { text:"冷却", cls:"off", detail:`冷却至 ${until.toLocaleString("zh-CN")}` };
      }
      if (!m.usable) return { text:"停用", cls:"off", detail:m.last_error ? "额度耗尽或手动停用" : "手动停用" };
      if (m.last_error) return { text:"异常", cls:"bad", detail:m.last_error };
      if (m.last_success_at) return { text:"可用", cls:"", detail:`最近成功 ${m.last_success_at}` };
      return { text:"待测", cls:"off", detail:"尚未成功调用" };
    }

    function logStatusClass(status) {
      const text = String(status || "");
      if (text === "200" || text.startsWith("2")) return "";
      if (text === "network" || text.includes("failed") || text.startsWith("5")) return "bad";
      return "off";
    }

    function tokenSummary(item) {
      const prompt = Number(item.prompt_tokens || 0);
      const completion = Number(item.completion_tokens || 0);
      const total = Number(item.total_tokens || 0);
      const cached = Number(item.cached_tokens || 0);
      if (!total && !prompt && !completion && !cached) return "-";
      const hit = prompt ? Math.round((cached / prompt) * 100) : 0;
      return `入 ${prompt} / 出 ${completion} / 总 ${total} / 缓 ${cached} (${hit}%)`;
    }

    function groupModels(groupId) {
      return state.models.filter(m => m.group_id === groupId);
    }

    function groupUpstreamModels(groupId) {
      const group = state.groups.find(g => g.id === groupId);
      if (!group?.upstream_models_fetched_at) return [];
      return Array.isArray(group?.upstream_models) ? group.upstream_models : [];
    }

    function currentModelGroup() {
      return state.groups.find(g => g.id === $("groupPick").value) || state.groups[0] || null;
    }

    function currentTestGroup() {
      return state.groups.find(g => g.id === $("testGroup").value) || state.groups[0] || null;
    }

    function selectedModelName() {
      return $("testModel").value || (state.auto_model_name || AUTO_MODEL_NAME);
    }

    function selectedRouteKey() {
      return currentTestGroup()?.route_key || "";
    }

    function testModelLabel(model) {
      const group = state.groups.find(g => g.id === model.group_id);
      const upstream = model.upstream_model || model.ep_id;
      if (group?.provider_type === "relay") return `${model.name} - ${upstream || "中转站"}`;
      if (group?.provider_type === "proxy") return `${model.name} - ${upstream || "通用代理"}`;
      return `${model.name} - ${model.ep_id}`;
    }

    function groupModelLabel(model) {
      const group = state.groups.find(g => g.id === model.group_id);
      const upstream = model.upstream_model || model.ep_id;
      if (group?.provider_type === "ark") return `${model.name} - ${model.ep_id}`;
      return `${model.name} - ${upstream}`;
    }

    function renderOptions(items, selectedValue, placeholder, labelFn) {
      const options = [`<option value="">${esc(placeholder)}</option>`];
      items.forEach(item => {
        options.push(`<option value="${esc(item.value)}"${item.value === selectedValue ? " selected" : ""}>${esc(labelFn(item))}</option>`);
      });
      return options.join("");
    }

    function renderGroupOptions(selectedId) {
      return renderOptions(
        state.groups.map(g => ({ value:g.id, label:`${g.name} - ${providerLabel(g)}` })),
        selectedId,
        "请选择连接组",
        item => item.label
      );
    }

    function renderModelOptions(groupId, selectedValue) {
      const models = groupUpstreamModels(groupId);
      const options = [`<option value="">请选择上游模型</option>`];
      models.forEach(model => {
        const value = model.ep_id || model.root || model.name;
        const label = model.name || value;
        options.push(`<option value="${esc(value)}"${value === selectedValue ? " selected" : ""}>${esc(label)} (${esc(value)})</option>`);
      });
      if (selectedValue && !models.some(model => (model.ep_id || model.root || model.name) === selectedValue)) {
        options.push(`<option value="${esc(selectedValue)}" selected>${esc(selectedValue)} (当前值)</option>`);
      }
      if (!models.length) {
        options.push(`<option value="">暂无可选模型</option>`);
      }
      return options.join("");
    }

    function groupMeta(groupId) {
      return state.group_meta?.[groupId] || { auto_model_name:AUTO_MODEL_NAME, model_count:0, usable_count:0 };
    }

    function fillGroupForm(group) {
      $("groupId").value = group?.id || "";
      $("groupName").value = group?.name || "";
      $("groupProvider").value = group?.provider_type || "ark";
      $("groupBase").value = group?.base_url || "";
      $("groupKey").value = group?.provider_type === "proxy" ? (group?.api_key || group?.ark_api_key || "") : (group?.ark_api_key || "");
      $("groupCooldownMinutes").value = Number(group?.auto_model_cooldown_minutes ?? 5);
      $("groupWafCompatible").checked = Boolean(group?.waf_compatible);
      syncGroupModeUI();
    }

    function fillModelForm(model) {
      $("modelId").value = model?.id || "";
      $("name").value = model?.name || "";
      $("groupPick").value = model?.group_id || ($("groupPick").value || state.groups[0]?.id || "");
      $("apiKey").value = model?.api_key || "";
      $("priceGroup").value = model?.price_group || "";
      $("epId").value = model?.ep_id || "";
      syncModelModeUI(model?.upstream_model || "");
    }

    function resetModelForm() {
      $("modelId").value = "";
      $("name").value = "";
      $("apiKey").value = "";
      $("priceGroup").value = "";
      $("epId").value = "";
      $("upstreamModelPick").innerHTML = "";
      $("upstreamModelPick").value = "";
      syncModelModeUI("");
    }

    function syncGroupModeUI() {
      const mode = $("groupProvider").value || "ark";
      const needsGroupKey = mode === "ark" || mode === "proxy";
      $("groupCooldownWrap").style.display = mode === "relay" ? "" : "none";
      $("groupWafWrap").style.display = mode === "relay" ? "" : "none";
      $("groupKeyWrap").style.display = needsGroupKey ? "" : "none";
      $("toggleKeyBtn").style.display = needsGroupKey ? "" : "none";
      $("groupKeyLabel").textContent = mode === "ark" ? "Ark API Key" : "上游 API Key";
      if (mode === "ark") $("groupModeHint").textContent = "火山方舟：组内保存 Ark Key，模型里填写 EP ID。";
      if (mode === "relay") $("groupModeHint").textContent = "中转站：组内只保存 Base URL；每个模型通道单独保存 API Key 和上游模型。";
      if (mode === "proxy") $("groupModeHint").textContent = "通用代理：组内保存 Base URL 和上游 API Key；未配置的具体模型保持原样透传。";
    }

    function syncModelModeUI(preferredUpstream = "") {
      const group = currentModelGroup();
      const relay = group?.provider_type === "relay";
      const proxy = group?.provider_type === "proxy";
      $("epIdWrap").style.display = relay || proxy ? "none" : "";
      $("upstreamModelWrap").style.display = relay || proxy ? "" : "none";
      $("modelKeyWrap").style.display = relay ? "" : "none";
      $("modelPriceWrap").style.display = relay ? "" : "none";
      $("fetchUpstreamBtn").style.display = (relay || proxy) ? "" : "none";
      if (relay || proxy) {
        const currentValue = preferredUpstream || "";
        $("upstreamModelPick").innerHTML = renderModelOptions(group?.id || "", currentValue);
        $("upstreamModelPick").value = currentValue;
      }
      if (proxy) $("modelModeHint").textContent = "通用代理可自动拉取上游模型列表，也可以手动维护本地映射。";
      else if (relay) $("modelModeHint").textContent = "中转站模式下可从上游自动获取模型并批量导入当前连接组。";
      else $("modelModeHint").textContent = "火山方舟模式下，上游模型填写 EP ID。";
    }

    function renderTestModels(preferredValue) {
      const autoName = state.auto_model_name || AUTO_MODEL_NAME;
      const group = currentTestGroup();
      const models = group ? groupModels(group.id) : [];
      const current = preferredValue ?? $("testModel").value;
      $("testModel").innerHTML = [
        `<option value="${esc(autoName)}">${esc(autoName)} - 自动调度</option>`,
        ...models.map(m => `<option value="${esc(m.name)}"${m.name === current ? " selected" : ""}>${esc(testModelLabel(m))}</option>`)
      ].join("");
      if (current && [...$("testModel").options].some(option => option.value === current)) {
        $("testModel").value = current;
      } else {
        $("testModel").value = autoName;
      }
    }

    function applyTestTemplate() {
      const model = selectedModelName();
      const template = $("testTemplate").value;
      const base = { messages:[{role:"user", content:"hello"}], temperature:0.2 };
      if (template === "auto") {
        $("testModel").value = state.auto_model_name || AUTO_MODEL_NAME;
        $("proxyBody").value = JSON.stringify(base, null, 2);
      } else if (template === "chat") {
        $("proxyBody").value = JSON.stringify(base, null, 2);
      } else if (template === "model") {
        $("proxyBody").value = JSON.stringify({ ...base, model }, null, 2);
      } else if (template === "stream") {
        $("proxyBody").value = JSON.stringify({ ...base, model, stream:true }, null, 2);
      }
      $("proxyPath").value = "/v1/chat/completions";
    }

    function bindGroupActions() {
      document.querySelectorAll("[data-group-edit]").forEach(btn => btn.onclick = (event) => {
        event.stopPropagation();
        fillGroupForm(state.groups.find(x => x.id === btn.dataset.groupEdit));
      });
      document.querySelectorAll("[data-copy-key]").forEach(btn => btn.onclick = async (event) => {
        event.stopPropagation();
        const group = state.groups.find(x => x.id === btn.dataset.copyKey);
        await navigator.clipboard.writeText(group?.route_key || "");
        log("连接组 Key 已复制");
      });
      document.querySelectorAll("[data-copy-client]").forEach(btn => btn.onclick = async (event) => {
        event.stopPropagation();
        await copyClientConfig(btn.dataset.copyClient);
      });
      document.querySelectorAll("[data-group-clone]").forEach(btn => btn.onclick = (event) => {
        event.stopPropagation();
        mutate(`/api/groups/${btn.dataset.groupClone}/clone`, {}).catch(err => log(String(err)));
      });
      document.querySelectorAll("[data-group-test]").forEach(btn => btn.onclick = (event) => {
        event.stopPropagation();
        $("testGroup").value = btn.dataset.groupTest;
        renderTestModels(state.auto_model_name || AUTO_MODEL_NAME);
        $("testTemplate").value = "auto";
        applyTestTemplate();
      });
      document.querySelectorAll("[data-group-del]").forEach(btn => btn.onclick = (event) => {
        event.stopPropagation();
        const group = state.groups.find(x => x.id === btn.dataset.groupDel);
        if (confirm(`删除连接组「${group?.name || btn.dataset.groupDel}」？`)) {
          mutate(`/api/groups/${btn.dataset.groupDel}`, {}, "DELETE").catch(err => log(String(err)));
        }
      });
    }

    function modelRow(model) {
      const info = statusInfo(model);
      const group = state.groups.find(g => g.id === model.group_id);
      const channel = group?.provider_type === "relay" ? (model.price_group || "中转站")
        : group?.provider_type === "proxy" ? "通用代理"
        : "火山";
      const upstream = group?.provider_type === "ark" ? model.ep_id : (model.upstream_model || model.ep_id);
      return `<tr>
        <td>${model.__index + 1}</td>
        <td>${esc(model.name)}</td>
        <td class="tiny">${esc(upstream)}</td>
        <td class="tiny">${esc(channel)}</td>
        <td><span class="pill ${info.cls}">${info.text}</span></td>
        <td class="tiny resultText" title="${esc(info.detail)}">${esc(info.detail)}</td>
        <td class="actions"><div class="actionGroup">
          <button type="button" data-edit="${model.id}">编辑</button>
          <button type="button" data-move-up="${model.id}">上移</button>
          <button type="button" data-move-down="${model.id}">下移</button>
          <button type="button" data-toggle="${model.id}">${model.usable ? "停用" : "启用"}</button>
          <button type="button" data-del="${model.id}" class="danger">删除</button>
        </div></td>
      </tr>`;
    }

    function bindModelActions() {
      document.querySelectorAll("[data-edit]").forEach(btn => btn.onclick = () => fillModelForm(state.models.find(x => x.id === btn.dataset.edit)));
      document.querySelectorAll("[data-move-up]").forEach(btn => btn.onclick = () => mutate(`/api/models/${btn.dataset.moveUp}/move`, { direction:"up" }));
      document.querySelectorAll("[data-move-down]").forEach(btn => btn.onclick = () => mutate(`/api/models/${btn.dataset.moveDown}/move`, { direction:"down" }));
      document.querySelectorAll("[data-toggle]").forEach(btn => btn.onclick = () => mutate(`/api/models/${btn.dataset.toggle}/toggle`, {}));
      document.querySelectorAll("[data-del]").forEach(btn => btn.onclick = () => {
        const model = state.models.find(x => x.id === btn.dataset.del);
        if (confirm(`删除模型「${model?.name || btn.dataset.del}」？`)) {
          mutate(`/api/models/${btn.dataset.del}`, {}, "DELETE").catch(err => log(String(err)));
        }
      });
    }

    function bindLogActions() {
      document.querySelectorAll("[data-log-detail]").forEach(btn => btn.onclick = () => {
        const item = (state.logs || [])[Number(btn.dataset.logDetail)];
        if (!item) return;
        log(`${item.time} ${item.model} ${item.status}\n${item.detail || "无详情"}`);
      });
    }

    function renderModels() {
      $("modelGroups").innerHTML = state.groups.map(group => {
        const meta = groupMeta(group.id);
        const models = groupModels(group.id).map((m, idx) => ({ ...m, __index: idx }));
        const rows = models.map(m => modelRow(m)).join("");
        return `<details class="modelGroup" open>
          <summary><div class="modelGroupSummary">
            <span>${esc(group.name)} - ${providerLabel(group)} - 模型 ${meta.model_count} - 可用 ${meta.usable_count}</span>
            <span class="modelGroupActions">
              <button type="button" data-group-test="${group.id}">测试自动</button>
              <button type="button" data-copy-client="${group.id}">复制 Hermes 配置</button>
              <button type="button" data-group-clone="${group.id}">复制组</button>
              <button type="button" data-group-edit="${group.id}">编辑组</button>
              <button type="button" data-copy-key="${group.id}">复制 Key</button>
              <button type="button" class="danger" data-group-del="${group.id}">删除组</button>
            </span>
          </div></summary>
          <div class="modelGroupBody">
            <div class="tiny muted" style="margin:10px 0">自动模型：${esc(meta.auto_model_name)} - 本地 Key：${esc(group.route_key)}${group.provider_type === "relay" ? ` - 冷却：${esc(group.auto_model_cooldown_minutes ?? 5)} 分钟 - WAF：${group.waf_compatible ? "开启" : "关闭"}` : ""}</div>
            <table class="modelTable">
              <thead><tr><th>优先级</th><th>名称</th><th>上游模型</th><th>通道</th><th>状态</th><th>最近结果</th><th>操作</th></tr></thead>
              <tbody>${rows || '<tr><td colspan="7" class="muted">该连接组暂无模型</td></tr>'}</tbody>
            </table>
          </div>
        </details>`;
      }).join("") || '<div class="muted">暂无连接组</div>';
      bindGroupActions();
      bindModelActions();
    }

    async function copyClientConfig(groupId) {
      const resp = await fetch(`/api/client-config/${groupId}`);
      const data = await resp.json();
      const text = `Base URL: ${data.base_url}\nAPI Key: ${data.api_key}\nModel: ${data.model}`;
      await navigator.clipboard.writeText(text);
      log(`Hermes 配置已复制\n${text}`);
    }

    async function refresh() {
      const resp = await fetch("/api/state");
      state = await resp.json();
      state.auto_model_name = state.auto_model_name || AUTO_MODEL_NAME;
      $("serverInfo").textContent = `${location.origin} - config: ${state.config_file}`;
      $("clientUrl").textContent = `${location.origin}/v1`;
      $("summaryBox").textContent = `组 ${state.groups.length} - 模型 ${state.models.length} - 可用 ${state.models.filter(m => m.usable).length}`;
      $("groupPick").innerHTML = renderGroupOptions($("groupPick").value);
      $("batchGroupPick").innerHTML = renderGroupOptions($("batchGroupPick").value || $("groupPick").value);
      $("testGroup").innerHTML = renderGroupOptions($("testGroup").value);
      if (!$("groupPick").value && state.groups[0]) $("groupPick").value = state.groups[0].id;
      if (!$("batchGroupPick").value && state.groups[0]) $("batchGroupPick").value = state.groups[0].id;
      if (!$("testGroup").value && state.groups[0]) $("testGroup").value = state.groups[0].id;
      syncGroupModeUI();
      syncModelModeUI("");
      renderTestModels($("testModel").value);
      renderModels();
      $("logTbody").innerHTML = (state.logs || []).map((item, idx) => `<tr>
        <td class="tiny">${esc(item.time)}</td>
        <td>${esc(item.model)}</td>
        <td><span class="pill ${logStatusClass(item.status)}">${esc(item.status)}</span></td>
        <td class="tiny">${Number(item.duration_ms || 0) ? `${Number(item.duration_ms)} ms` : "-"}</td>
        <td class="tiny">${esc(tokenSummary(item))}</td>
        <td class="tiny resultText" title="${esc(item.detail)}">${esc(item.detail)}</td>
        <td><button type="button" data-log-detail="${idx}">查看</button></td>
      </tr>`).join("") || '<tr><td colspan="7" class="muted">暂无请求</td></tr>';
      bindLogActions();
    }

    async function mutate(url, body, method="POST") {
      const resp = await fetch(url, {
        method,
        headers: { "Content-Type":"application/json" },
        body: method === "DELETE" ? undefined : JSON.stringify(body),
      });
      const text = await resp.text();
      if (!resp.ok) throw new Error(text || resp.statusText);
      await refresh();
      log(text || "ok");
    }

    $("copyClientBtn").onclick = async () => {
      await navigator.clipboard.writeText($("clientUrl").textContent);
      log("客户端地址已复制");
    };

    $("groupForm").onsubmit = async (e) => {
      e.preventDefault();
      const mode = $("groupProvider").value;
      const key = $("groupKey").value.trim();
      await mutate("/api/groups", {
        id:$("groupId").value || undefined,
        name:$("groupName").value.trim(),
        provider_type:mode,
        base_url:$("groupBase").value.trim() || undefined,
        ark_api_key:mode === "ark" ? key : "",
        api_key:mode === "proxy" ? key : "",
        auto_model_cooldown_minutes:mode === "relay" ? Number($("groupCooldownMinutes").value || 0) : undefined,
        waf_compatible:mode === "relay" ? $("groupWafCompatible").checked : false,
      });
      fillGroupForm(null);
    };

    $("groupProvider").onchange = syncGroupModeUI;
    $("groupPick").onchange = () => resetModelForm();
    $("upstreamModelPick").onchange = () => {};

    $("modelForm").onsubmit = async (e) => {
      e.preventDefault();
      const group = currentModelGroup();
      const usePicker = group && ["relay", "proxy"].includes(group.provider_type);
      const upstreamModel = usePicker ? $("upstreamModelPick").value.trim() : $("epId").value.trim();
      await mutate("/api/models", {
        id:$("modelId").value || undefined,
        name:$("name").value.trim(),
        ep_id:upstreamModel,
        group_id:$("groupPick").value,
        api_key:$("apiKey").value.trim(),
        price_group:$("priceGroup").value.trim(),
        upstream_model: upstreamModel,
      });
      resetModelForm();
    };

    $("resetBtn").onclick = async () => mutate("/api/reset", {});

    $("fetchUpstreamBtn").onclick = async () => {
      const group = currentModelGroup();
      if (!group || !["relay", "proxy"].includes(group.provider_type)) {
        log("只有中转站或通用代理模式才能自动获取模型");
        return;
      }
      const btn = $("fetchUpstreamBtn");
      const oldText = btn.textContent;
      btn.disabled = true;
      btn.textContent = "获取中...";
      try {
        const resp = await fetch("/api/models/fetch-upstream", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({
            group_id: group.id,
            api_key: $("apiKey").value.trim() || $("groupKey").value.trim(),
          }),
        });
        const text = await resp.text();
        if (!resp.ok) {
          log(text || resp.statusText);
          return;
        }
        await refresh();
        log(text || "ok");
      } finally {
        btn.disabled = false;
        btn.textContent = oldText;
      }
    };

    $("clearLogsBtn").onclick = async () => mutate("/api/logs/clear", {});
    $("exportLogsBtn").onclick = () => { location.href = "/api/logs/export"; };
    $("batchImportBtn").onclick = async () => {
      await mutate("/api/models/batch", {
        group_id:$("batchGroupPick").value,
        text:$("batchModels").value,
        api_key:$("batchApiKey").value.trim(),
        price_group:$("batchPriceGroup").value.trim(),
      });
      $("batchModels").value = "";
    };

    $("toggleKeyBtn").onclick = () => {
      const input = $("groupKey");
      input.type = input.type === "password" ? "text" : "password";
      $("toggleKeyBtn").textContent = input.type === "password" ? "显示 Key" : "隐藏 Key";
    };

    $("testGroup").onchange = () => {
      renderTestModels(state.auto_model_name || AUTO_MODEL_NAME);
      applyTestTemplate();
    };
    $("testTemplate").onchange = applyTestTemplate;
    $("testModel").onchange = () => {
      if (["model", "stream"].includes($("testTemplate").value)) applyTestTemplate();
    };
    $("sendTest").onclick = async () => {
      const btn = $("sendTest");
      btn.disabled = true;
      btn.textContent = "发送中...";
      try {
        const payload = JSON.parse($("proxyBody").value);
        const selectedModel = $("testModel").value;
        if (selectedModel && selectedModel !== (state.auto_model_name || AUTO_MODEL_NAME)) payload.model = selectedModel;
        const startedAt = performance.now();
        const group = currentTestGroup();
        const headers = { "Content-Type":"application/json", "Authorization":`Bearer ${selectedRouteKey()}` };
        if (group?.provider_type === "relay" && group?.waf_compatible) {
          headers["X-LinRouter-Test"] = "relay-waf";
        }
        const resp = await fetch($("proxyPath").value, {
          method:"POST",
          headers,
          body: JSON.stringify(payload),
        });
        const text = await resp.text();
        const elapsed = Math.round(performance.now() - startedAt);
        log(`HTTP ${resp.status} - ${elapsed} ms\n${formatResponse(text)}`);
        await refresh();
      } catch (err) {
        log(String(err));
      } finally {
        btn.disabled = false;
        btn.textContent = "发送测试";
      }
    };

    refresh().catch(err => log(String(err)));
  </script>
</body>
</html>
